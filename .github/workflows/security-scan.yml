name: Security Scan

on:
  push:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - '.github/workflows/security-scan.yml'
  pull_request:
    branches: [main]
    paths:
      - 'mcp-server/**'
      - '.github/workflows/security-scan.yml'
  schedule:
    - cron: '0 0 * * 0'  # Weekly: Sunday at midnight UTC

jobs:
  bandit-sast:
    name: Bandit SAST Analysis
    runs-on: ubuntu-latest
    # Permissions scoped at job level per SonarCloud V1 finding + GitHub Actions best practice
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          echo "Running Bandit SAST analysis on mcp-server/src/..."
          cd mcp-server
          bandit -r src/ -ll -ii --skip B101 -f json -o ../bandit-report.json || true
          bandit -r src/ -ll -ii --skip B101 || true

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 90

      - name: Security scan summary
        if: always()
        run: |
          echo "## Bandit SAST Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f bandit-report.json ]; then
            ISSUES=$(python -c "import json; d=json.load(open('bandit-report.json')); print(len(d.get('results',[])))" 2>/dev/null || echo "unknown")
            echo "Issues found: $ISSUES" >> $GITHUB_STEP_SUMMARY
          else
            echo "No report generated" >> $GITHUB_STEP_SUMMARY
          fi

  safety-sca:
    name: Safety Dependency Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install Safety
        run: pip install safety

      - name: Check dependencies for vulnerabilities
        run: |
          echo "Running Safety dependency vulnerability check..."
          cd mcp-server
          safety check -r requirements.txt --output text || true

      - name: Safety scan summary
        if: always()
        run: |
          echo "## Safety Dependency Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checked mcp-server/requirements.txt for known vulnerabilities" >> $GITHUB_STEP_SUMMARY

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    # Job-level permissions required to upload SARIF results to the security tab.
    # Regression context: once any job in the workflow declared explicit permissions
    # (bandit-sast did, per SonarCloud V1), GitHub switched the whole workflow to
    # job-level permissioning. Jobs without an explicit block fall to a minimal
    # default that excludes security-events:write, causing CodeQL upload to fail
    # with "Resource not accessible by integration" on every push to main since
    # v0.5.31. Same scopes the bandit-sast job uses, plus actions:read which the
    # CodeQL action needs for tool-cache + workflow metadata reads.
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Initialize CodeQL
        uses: github/codeql-action/init@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v3
        with:
          languages: python
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@87557b9c84dde89fdd9b10e88954ac2f4248e463  # v3
        with:
          category: "/language:python"

      - name: CodeQL summary
        if: always()
        run: |
          echo "## CodeQL Analysis Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "CodeQL semantic analysis completed for Python code" >> $GITHUB_STEP_SUMMARY
