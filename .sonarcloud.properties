# SonarQube Cloud — Automatic Analysis configuration
#
# NOTE: Automatic Analysis (the GitHub-App scan this repo uses) reads THIS file
# (.sonarcloud.properties), NOT sonar-project.properties — that file is only
# read by CI-based scanner runs and is ignored by autoscan. Verified against
# docs.sonarsource.com 2026-07-02 after the sonar-project.properties attempt
# (PR #268) demonstrably changed nothing (python.version warning persisted,
# S1313 issue-ignore never applied).
#
# Supported keys here are limited: exclusions/inclusions, python.version,
# sourceEncoding, cpd.exclusions. Issue-level rule ignores (e.g. S1313 on
# ip_blocklist.py) are NOT supported in this file — use per-line bare
# `# NOSONAR` or the UI (Administration > General Settings > Analysis Scope).

# Python versions the code must stay compatible with
# (pyproject requires-python >= 3.11; CI runs 3.11; Docker/Cloud Run 3.12)
sonar.python.version=3.11,3.12,3.13

# Source encoding (clears the "problems with file encoding" analysis warning)
sonar.sourceEncoding=UTF-8
